# ===================================================================
# ?? ?? (Common Configuration)
# ===================================================================
spring.application.name=hipster

# ?? ??? ?? (?? ?? ??? ???? ??)
spring.profiles.active=local

# JPA ??
spring.jpa.open-in-view=false

# JPA DDL 자동 생성 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Spring Batch Job 시작 시 자동 실행 비활성화 (Scheduler로 트리거)
spring.batch.job.enabled=false

# ===================================================================
# ??? ?? (Custom Configuration)
# ===================================================================
hipster.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-development-only-change-in-production}

# 15? (900000)
hipster.jwt.access-token-expiry=900000
# 7? (604800000)
hipster.jwt.refresh-token-expiry=604800000

hipster.weighting.recalculation-cron="0 0 2 */45 * ?"
hipster.chart.update-cron="0 0 9 ? * TUE"
chart.publish.enabled=false
chart.publish.chart-name=weekly_chart
chart.publish.stage-table-name=chart_scores_stage
chart.publish.previous-table-name=chart_scores_prev
chart.publish.published-version-cache-key=chart-meta:published-version:v1

# ===================================================================
# Actuator & Prometheus Configuration
# ===================================================================
management.endpoints.web.exposure.include=health,prometheus
management.metrics.tags.application=hipster-api
hipster.moderation.claim-timeout-recovery-cron=0 * * * * ?
hipster.moderation.sla-hours=24
hipster.reward.default-campaign-code=catalog_bootstrap_v1
hipster.reward.default-campaign-name=moderation_approved_contribution_v1
hipster.reward.points-per-approval=100
hipster.reward.max-total-points=100000
hipster.reward.outbox.publisher.enabled=true
hipster.reward.outbox.publish-fixed-delay-ms=5000
hipster.reward.outbox.batch-size=50
hipster.reward.outbox.retry-delay-ms=30000
hipster.reward.outbox.dispatched-timeout-ms=30000
hipster.reward.outbox.publish-confirm-timeout-ms=5000
spring.rabbitmq.publisher-confirm-type=simple
