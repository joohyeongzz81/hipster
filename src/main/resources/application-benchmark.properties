# ===================================================================
# 차트 벤치마크 전용 환경 (benchmark Profile)
# - master 단일 DB로 고정해 slave/복제 지연 변수를 제거
# ===================================================================
server.port=8080

# Database (Master only)
spring.datasource.master.jdbc-url=jdbc:mysql://localhost:3306/hipster?rewriteBatchedStatements=true&profileSQL=true&logger=Slf4JLogger&maxQuerySizeToLog=999999&useCursorFetch=true
spring.datasource.master.username=root
spring.datasource.master.password=password
spring.datasource.master.driver-class-name=com.mysql.cj.jdbc.Driver

# Bean 생성은 유지하되, 라우팅 비활성화로 slave 경로를 제거한다.
spring.datasource.slave.jdbc-url=jdbc:mysql://localhost:3306/hipster?rewriteBatchedStatements=true&profileSQL=true&logger=Slf4JLogger&maxQuerySizeToLog=999999&useCursorFetch=true
spring.datasource.slave.username=root
spring.datasource.slave.password=password
spring.datasource.slave.driver-class-name=com.mysql.cj.jdbc.Driver
hipster.datasource.routing-enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200
chart.search.index-name=chart_scores_bench

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=hipster
spring.rabbitmq.password=hipster123

# Logging
logging.level.com.hipster=INFO
logging.level.com.hipster.chart.benchmark=DEBUG
logging.level.org.hibernate.SQL=INFO
