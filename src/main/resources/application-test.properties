# JPA & DB
# TestcontainersлҘј мӮ¬мҡ©н•ҳм—¬ MySQL м»Ён…Ңмқҙл„ҲлҘј лҸҷм ҒмңјлЎң мӢӨн–үн•©лӢҲлӢӨ.
# build.gradle(.kts)мқҳ testImplementationм—җ 'org.testcontainers:mysql' мқҳмЎҙм„ұмқҙ н•„мҡ”н•©лӢҲлӢӨ.
spring.datasource.url=jdbc:tc:mysql:8.0.33:///testdb?rewriteBatchedStatements=true&profileSQL=true&logger=Slf4JLogger&maxQuerySizeToLog=999999&useCursorFetch=true
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.master.jdbc-url=${spring.datasource.url}
spring.datasource.master.username=${spring.datasource.username:}
spring.datasource.master.password=${spring.datasource.password:}
spring.datasource.master.driver-class-name=${spring.datasource.driver-class-name}
spring.datasource.slave.jdbc-url=${spring.datasource.url}
spring.datasource.slave.username=${spring.datasource.username:}
spring.datasource.slave.password=${spring.datasource.password:}
spring.datasource.slave.driver-class-name=${spring.datasource.driver-class-name}
hipster.datasource.routing-enabled=false
# н…ҢмҠӨнҠё мӢңмһ‘ мӢң мҠӨнӮӨл§ҲлҘј мғқм„ұн•ҳкі , мў…лЈҢ мӢң Testcontainers мһҗмІҙм—җ мқҳн•ҙ мӮӯм ңлҗ©лӢҲлӢӨ.
spring.jpa.hibernate.ddl-auto=update

# Redis & RabbitMQ
# 'org.testcontainers:junit-jupiter'мҷҖ к°Ғ м„ңл№„мҠӨ('org.testcontainers:redis', 'org.testcontainers:rabbitmq') мқҳмЎҙм„ұмқҙ мһҲкі ,
# Spring Boot Starter(spring-boot-starter-data-redis, spring-boot-starter-amqp)к°Җ нҒҙлһҳмҠӨнҢЁмҠӨм—җ мһҲмңјл©ҙ
# Spring Boot 3.1+ м—җм„ң мһҗлҸҷмңјлЎң м»Ён…Ңмқҙл„ҲлҘј мӢӨн–үн•ҳкі  м—°кІ°н•©лӢҲлӢӨ.
# л”°лқјм„ң нҳёмҠӨнҠё/нҸ¬нҠё л“ұ лі„лҸ„ м—°кІ° м •ліҙ м„Өм •мқҙ н•„мҡ” м—ҶмҠөлӢҲлӢӨ.

# Spring Batch
# н…ҢмҠӨнҠё мӢң л°°м№ҳ л©”нғҖ н…Ңмқҙлё” к°•м ң мғқм„ұ л°Ҹ мҠӨмјҖмӨ„л§Ғ мһЎ мһҗлҸҷ мӢӨн–ү л°©м§Җ
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Logging
logging.level.com.hipster=DEBUG
