# ===================================================================
# 로컬 개발 환경 (local Profile)
# ===================================================================
server.port=8080

# Database (MySQL Master - Write)
spring.datasource.master.jdbc-url=jdbc:mysql://localhost:3306/hipster
spring.datasource.master.username=root
spring.datasource.master.password=password
spring.datasource.master.driver-class-name=com.mysql.cj.jdbc.Driver

# Database (MySQL Slave - ReadOnly)
spring.datasource.slave.jdbc-url=jdbc:mysql://localhost:3307/hipster
spring.datasource.slave.username=root
spring.datasource.slave.password=password
spring.datasource.slave.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=hipster
spring.rabbitmq.password=hipster123

# Logging
logging.level.com.hipster=DEBUG
logging.level.org.hibernate.SQL=DEBUG