<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">평점과 차트 흐름</title>
  <desc id="desc">평점 입력부터 원본 저장, 비동기 집계, 차트 생성 공개, 차트 조회까지의 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #eff6ff; stroke: #60a5fa; }
      .storage { fill: #f0fdf4; stroke: #4ade80; }
      .search { fill: #fffbeb; stroke: #f59e0b; }
      .line { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .title { font: 700 28px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #111827; }
      .label { font: 600 17px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #111827; }
      .small { font: 500 14px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="420"/>
  <text class="title" x="50" y="48">평점과 차트 흐름</text>

  <rect class="box accent" x="50" y="90" width="150" height="70"/>
  <text class="label" x="125" y="132" text-anchor="middle">평점 입력 API</text>

  <rect class="box storage" x="260" y="90" width="160" height="70"/>
  <text class="label" x="340" y="132" text-anchor="middle">원본 평점 저장</text>

  <rect class="box accent" x="480" y="90" width="180" height="70"/>
  <text class="label" x="570" y="124" text-anchor="middle">비동기 집계 반영</text>
  <text class="small" x="570" y="144" text-anchor="middle">AFTER_COMMIT + RabbitMQ</text>

  <rect class="box storage" x="720" y="90" width="170" height="70"/>
  <text class="label" x="805" y="124" text-anchor="middle">릴리즈별 집계</text>
  <text class="small" x="805" y="144" text-anchor="middle">전체 재집계 보정</text>

  <rect class="box accent" x="950" y="90" width="110" height="70"/>
  <text class="label" x="1005" y="132" text-anchor="middle">차트 생성</text>

  <rect class="box accent" x="760" y="230" width="150" height="70"/>
  <text class="label" x="835" y="272" text-anchor="middle">공개 버전 전환</text>

  <rect class="box accent" x="520" y="230" width="150" height="70"/>
  <text class="label" x="595" y="272" text-anchor="middle">차트 조회 API</text>

  <rect class="box search" x="260" y="220" width="120" height="56"/>
  <text class="label" x="320" y="254" text-anchor="middle">Redis 캐시</text>

  <rect class="box search" x="220" y="310" width="160" height="56"/>
  <text class="label" x="300" y="344" text-anchor="middle">Elasticsearch 검색</text>

  <rect class="box storage" x="430" y="310" width="130" height="56"/>
  <text class="label" x="495" y="344" text-anchor="middle">MySQL 폴백</text>

  <path class="line" d="M 200 125 L 260 125"/>
  <path class="line" d="M 420 125 L 480 125"/>
  <path class="line" d="M 660 125 L 720 125"/>
  <path class="line" d="M 890 125 L 950 125"/>
  <path class="line" d="M 1005 160 L 1005 195 L 835 195 L 835 230"/>
  <path class="line" d="M 760 265 L 670 265"/>
  <path class="line" d="M 520 248 L 380 248"/>
  <path class="line" d="M 300 276 L 300 310"/>
  <path class="line" d="M 520 282 L 495 282 L 495 310"/>
</svg>
