global:
  scrape_interval: 10s

scrape_configs:
  # Spring Boot application metrics
  - job_name: "hipster-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  # MySQL exporter metrics
  - job_name: "mysql"
    static_configs:
      - targets: ["mysqld-exporter:9104"]
